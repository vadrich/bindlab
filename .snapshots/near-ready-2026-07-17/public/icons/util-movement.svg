<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" fill="#000000"/>
  <rect x="56" y="56" width="400" height="400" rx="72" ry="72" fill="none" stroke="#22d3ee" stroke-width="28"/>

  <!-- ground -->
  <line x1="128" y1="392" x2="384" y2="392" stroke="#22d3ee" stroke-width="16" stroke-linecap="round"/>

  <!--
    Jump figure — proportional stick person mid-air
    head ≈ 1 unit, torso ≈ 2, legs ≈ 2.2, stroke ≈ neck width
  -->
  <g stroke="#22d3ee" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- head -->
    <circle cx="212" cy="168" r="22" fill="#22d3ee" stroke="none"/>
    <!-- torso -->
    <path d="M212 194 L212 268" stroke-width="16"/>
    <!-- arm back (up) -->
    <path d="M212 214 L168 188" stroke-width="14"/>
    <!-- arm front (forward balance) -->
    <path d="M212 218 L262 198" stroke-width="14"/>
    <!-- thigh / shin left (tucked) -->
    <path d="M212 268 L178 318" stroke-width="14"/>
    <path d="M178 318 L156 348" stroke-width="14"/>
    <!-- thigh / shin right (push) -->
    <path d="M212 268 L252 322" stroke-width="14"/>
    <path d="M252 322 L278 352" stroke-width="14"/>
  </g>

  <!-- bounce / jump arc + arrow -->
  <path
    d="M304 348 Q368 280 368 168"
    fill="none"
    stroke="#22d3ee"
    stroke-width="16"
    stroke-linecap="round"
  />
  <path
    d="M348 148 L368 118 L392 152"
    fill="none"
    stroke="#22d3ee"
    stroke-width="14"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
