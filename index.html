<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <title>%SITE_TITLE%</title>
    <meta name="description" content="%SITE_DESCRIPTION%" />
    <meta name="keywords" content="%SITE_KEYWORDS%" />
    <meta name="author" content="BindLab" />
    <meta
      name="robots"
      content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
    />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large" />
    <meta name="yandex" content="index, follow" />
    <meta name="application-name" content="BindLab" />
    <meta name="apple-mobile-web-app-title" content="BindLab" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#05080e" />
    <meta name="msapplication-TileColor" content="#05080e" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <link rel="canonical" href="%SITE_URL%/" />
    <link rel="alternate" hreflang="ru" href="%SITE_URL%/" />
    <link rel="alternate" hreflang="en" href="%SITE_URL%/" />
    <link rel="alternate" hreflang="x-default" href="%SITE_URL%/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:locale:alternate" content="en_US" />
    <meta property="og:site_name" content="BindLab" />
    <meta property="og:url" content="%SITE_URL%/" />
    <meta property="og:title" content="%SITE_TITLE%" />
    <meta property="og:description" content="%SITE_DESCRIPTION%" />
    <meta property="og:image" content="%SITE_URL%/og-image.png" />
    <meta property="og:image:secure_url" content="%SITE_URL%/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="BindLab — генератор биндов CS2" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="%SITE_TITLE%" />
    <meta
      name="twitter:description"
      content="%SITE_DESCRIPTION%"
    />
    <meta name="twitter:image" content="%SITE_URL%/og-image.png" />
    <meta name="twitter:image:alt" content="BindLab — бинды CS2" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="sitemap" type="application/xml" href="%SITE_URL%/sitemap.xml" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Tektur:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- JSON-LD injected at build time -->
    %JSON_LD%
  </head>
  <body>
    <div id="root"></div>
    <noscript>
      <main
        style="max-width:42rem;margin:2rem auto;padding:1.5rem;font-family:system-ui,sans-serif;color:#e5e7eb;background:#0a0e14;line-height:1.55"
      >
        <h1>BindLab — генератор биндов и настроек CS2</h1>
        <p>
          Бесплатный онлайн-сервис для Counter-Strike 2: визуальные
          <strong>бай-бинды</strong>, <strong>jumpthrow</strong>, прицел,
          радар, FPS, звук, unbind и сборка <strong>autoexec / конфига CS2</strong>.
          Скопируйте команды и вставьте в консоль игры (~).
        </p>
        <h2>Что можно настроить</h2>
        <ul>
          <li>Бай-меню CS2 и buy binds на любую клавишу</li>
          <li>Jumpthrow, бинды гранат, практика</li>
          <li>Crosshair / прицел, радар, viewmodel FOV</li>
          <li>Настройки звука, сети и производительности</li>
          <li>Unbindall и выборочный сброс биндов</li>
          <li>Сохранение конфига и шаринг ссылкой</li>
        </ul>
        <h2>Популярные запросы</h2>
        <p>
          бинды CS2, бинды кс 2, генератор биндов CS2, бай бинды CS2, jumpthrow
          CS2, конфиг CS2, autoexec CS2, настройки CS2, unbindall, прицел CS2.
        </p>
        <p>
          Включите JavaScript, чтобы пользоваться полным визуальным
          конфигуратором BindLab на bindlab.ru.
        </p>
        <p lang="en">
          Free CS2 bind and settings generator. Enable JavaScript to use the
          full BindLab app.
        </p>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
